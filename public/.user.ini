; Laravel public — raise PHP upload limits for creative images (max 5MB file).
; Takes effect on next request if PHP-FPM allows per-dir .user.ini (user_ini.filename).
; Otherwise copy deploy/php/99-xanderbot-upload.ini into /etc/php/*/fpm/conf.d/ and reload php-fpm.
upload_max_filesize = 5M
post_max_size = 8M
